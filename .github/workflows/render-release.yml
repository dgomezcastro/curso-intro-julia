name: Render and Release

on:
  push:
    branches: [main, master]

jobs:
  render-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      - name: Instantiate Julia project
        run: julia --project=src -e 'using Pkg; Pkg.instantiate()'

      - name: Install Python dependencies
        run: python3 -m pip install jupyter nbformat

      - name: Render Quarto documents
        working-directory: src
        run: quarto render

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build ${{ github.run_number }} — ${{ github.sha }}"
          files: |
            apuntes/*.html
            diapositivas/*.html
